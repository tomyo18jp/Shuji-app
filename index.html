var _storage={
  set:function(k,v){return new Promise(function(res,rej){try{localStorage.setItem(k,typeof v==='string'?v:JSON.stringify(v));res({key:k,value:v})}catch(e){rej(e)}});},
  get:function(k){return new Promise(function(res){var v=localStorage.getItem(k);res(v!==null?{key:k,value:v}:null)});},
  delete:function(k){return new Promise(function(res){localStorage.removeItem(k);res({key:k,deleted:true})});},
  list:function(p){return new Promise(function(res){var keys=Object.keys(localStorage).filter(function(k){return !p||k.startsWith(p)});res({keys:keys})});}
};

<script type="text/babel">

  { key: "gyosho9",  category: "行書", label: "筆書き",   sublabel: "Reggae One",          family: "'Reggae One', cursive",           googleUrl: "https://fonts.googleapis.com/css2?family=Reggae+One&display=swap" },
  { key: "gyosho10", category: "行書", label: "B1古典",   sublabel: "Shippori Antique B1", family: "'Shippori Antique B1', serif",    googleUrl: "https://fonts.googleapis.com/css2?family=Shippori+Antique+B1&display=swap" },
  { key: "gyosho11", category: "行書", label: "縦書祐二", sublabel: "Yuji Syuku",          family: "'Yuji Syuku', serif",             googleUrl: "https://fonts.googleapis.com/css2?family=Yuji+Syuku&display=swap" },
  { key: "gyosho12", category: "行書", label: "さらり行書", sublabel: "しょかきさらり行体", family: "'ShokakiSarari', cursive",         googleUrl: "" },
  { key: "gyosho13", category: "行書", label: "がた草書",   sublabel: "がた草書体",          family: "'GataSosyo', cursive",             googleUrl: "" },

  { key: "sosho1",   category: "草書", label: "草書風",   sublabel: "Shippori Mincho",     family: "'Shippori Mincho', serif",        googleUrl: "https://fonts.googleapis.com/css2?family=Shippori+Mincho&display=swap" },

  // ── 明朝・その他 ──────────────────────
  { key: "mincho1",  category: "明朝", label: "明朝体",   sublabel: "Noto Serif JP",       family: "'Noto Serif JP', serif",          googleUrl: "https://fonts.googleapis.com/css2?family=Noto+Serif+JP&display=swap" },
  { key: "mincho2",  category: "明朝", label: "解星",     sublabel: "Kaisei Opti",         family: "'Kaisei Opti', serif",            googleUrl: "https://fonts.googleapis.com/css2?family=Kaisei+Opti&display=swap" },
  { key: "mincho3",  category: "明朝", label: "解星春海", sublabel: "Kaisei HarunoUmi",    family: "'Kaisei HarunoUmi', serif",       googleUrl: "https://fonts.googleapis.com/css2?family=Kaisei+HarunoUmi&display=swap" },
  { key: "mincho4",  category: "明朝", label: "さわらび", sublabel: "Sawarabi Mincho",     family: "'Sawarabi Mincho', serif",        googleUrl: "https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap" },

const CHAR_TYPE = { KANJI: "kanji", KANA: "kana", ALPHA: "alpha" };
function charType(ch) {
  if (/[\u4E00-\u9FFF\u3400-\u4DBF\uF900-\uFAFF]/.test(ch)) return CHAR_TYPE.KANJI;
  if (/[\u3040-\u309F\u30A0-\u30FF\u3000-\u303F]/.test(ch))  return CHAR_TYPE.KANA;
  return CHAR_TYPE.ALPHA;
}

function loadFont(url) {
  if (!document.querySelector(`link[href="${url}"]`)) {
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = url;
    document.head.appendChild(link);
  }
}
FONTS.forEach((f) => loadFont(f.googleUrl));

const SIZE_TARGETS = [
  { key: "all",           label: "全体",  color: "#7a5c9a" },
  { key: CHAR_TYPE.KANJI, label: "漢字",  color: "#6b4c2a" },
  { key: CHAR_TYPE.KANA,  label: "平仮名", color: "#4a6b8a" },
  { key: CHAR_TYPE.ALPHA, label: "英数字", color: "#4a7c59" },
];

function KadaiContent({ text, sizes, currentFont: currentFontProp, vertical, renderText, lineCount, lineSplits, bgImage, textOffset, lineHeight, justify, autoFontSize, onAutoFontSize, showOffsetGuide, onDragOffset, vAlign }) {
  const currentFont = currentFontProp ?? FONTS[0];
  const textBoxStyle = vertical
    ? { writingMode: "vertical-rl", textOrientation: "mixed", display: "block" }
    : { writingMode: "horizontal-tb", display: "block" };
  const paperTexture = vertical
    ? { backgroundImage: "repeating-linear-gradient(to bottom, transparent, transparent 99%, #e8dfc8 100%)", backgroundSize: "100% 60px", opacity: 0.35 }
    : { backgroundImage: "repeating-linear-gradient(to right, transparent, transparent 99%, #e8dfc8 100%)", backgroundSize: "60px 100%", opacity: 0.35 };

  const textContainerRef = useRef(null);
  const lineRefs = useRef([]);

  // splitsから行配列を生成
  const lines = lineCount > 0 && lineSplits && lineSplits.length > 0
    ? (() => {
        const points = [0, ...lineSplits, text.length];
        return points.slice(0, -1).map((start, i) => text.slice(start, points[i + 1])).filter(l => l);
      })()
    : lineCount > 0
    ? (() => {
        const perLine = Math.ceil(text.length / lineCount);
        return Array.from({ length: lineCount }, (_, i) => text.slice(i * perLine, (i + 1) * perLine)).filter(l => l);
      })()
    : null;

  // 最長行基準で1行に収まる最大フォントサイズを自動計算
  useEffect(() => {
    if (!lines || lines.length === 0 || !autoFontSize) return;
    let cancelled = false;

    const calc = () => {
      if (cancelled) return;
      const containerEl = textContainerRef.current;
      if (!containerEl) return;
      const containerW = containerEl.offsetWidth;
      const containerH = containerEl.offsetHeight;
      if (containerW <= 0 || containerH <= 0) return;

      const longestLine = lines.reduce((a, b) => a.length >= b.length ? a : b, "");
      if (!longestLine) return;

      const maxHeightPerLine = (containerH / lines.length) * 0.88;

      // Canvasで測定（Google Fontsも正確に測定できる）
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      let lo = 6, hi = Math.min(72, maxHeightPerLine / (lineHeight ?? 1.8)), best = 6;
      for (let i = 0; i < 24; i++) {
        const mid = (lo + hi) / 2;
        ctx.font = `${mid}px ${currentFont.family}, serif`;
        const measured = ctx.measureText(longestLine).width;
        if (measured <= containerW * 0.88) { best = mid; lo = mid; }
        else { hi = mid; }
      }

      if (!cancelled) onAutoFontSize(parseFloat(best.toFixed(1)));
    };

    // 起動時はフォント+レイアウト完了を確実に待つ
    document.fonts.ready.then(() => {
      if (cancelled) return;
      // 3段階RAFで確実にDOM・レイアウト完了後に計算
      requestAnimationFrame(() => requestAnimationFrame(() => requestAnimationFrame(() => calc())));
    });

    return () => { cancelled = true; };
  }, [lines?.join(""), lineSplits?.join(","), currentFont.key, autoFontSize, textOffset, bgImage, lineHeight]);

  // letter-spacing で両端揃え（space-betweenを廃止→文字切れ防止）
  const [letterSpacings, setLetterSpacings] = useState([]);

  // CSS justify方式（letterSpacingsは不要）
  useEffect(() => {
    setLetterSpacings([]);
  }, [justify, lines?.join(""), lineSplits?.join(",")]); 

  const offsetStyle = textOffset ? {
    position: bgImage ? "absolute" : "relative",
    ...(bgImage ? {
      top: textOffset.top,
      left: textOffset.left,
      right: textOffset.right,
      bottom: textOffset.bottom,
    } : {
      margin: `${textOffset.top}px ${textOffset.right}px ${textOffset.bottom}px ${textOffset.left}px`,
    }),
    zIndex: 1,
    overflow: "visible",
  } : { position: "relative", zIndex: 1, padding: "8px 0" };

  // テキストエリアのクリップ用ラッパースタイル（はみ出し防止）
  const clipStyle = bgImage && textOffset ? {
    position: "absolute",
    top: textOffset.top,
    left: textOffset.left,
    right: textOffset.right,
    bottom: textOffset.bottom,
    zIndex: 1,
    overflow: "hidden",
    pointerEvents: "none",
  } : null;

  return (
    <>
      {/* 背景：PDF画像 or 和紙テクスチャ */}
      {bgImage
        ? <img src={bgImage} alt="背景" style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover", pointerEvents: "none", zIndex: 0, opacity: 1 }} />
        : <div style={{ position: "absolute", inset: 0, pointerEvents: "none", ...paperTexture }} />
      }

      {/* ヘッダー（PDF背景なしのとき） */}
      {!bgImage && (
        <div style={{ position: "relative", zIndex: 1, textAlign: "center", marginBottom: 28, paddingBottom: 16, borderBottom: "2px solid #8b7355", display: "flex", justifyContent: "center", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
          <span style={{ fontSize: 13, letterSpacing: "0.4em", color: "#6b4c2a", fontFamily: "sans-serif" }}>令和　　年　　月　　日</span>
          <span style={{ fontSize: 12, color: "#a08060", fontFamily: "sans-serif", background: "#f0e8d4", padding: "2px 10px", borderRadius: 20 }}>{currentFont.label}（{currentFont.sublabel}）</span>
          <span style={{ fontSize: 12, color: "#a08060", fontFamily: "sans-serif", background: "#e8f0e4", padding: "2px 10px", borderRadius: 20 }}>{vertical ? "縦書き" : "横書き"}</span>
          <span style={{ fontSize: 11, color: "#a08060", fontFamily: "sans-serif", background: "#f0f0e4", padding: "2px 10px", borderRadius: 20 }}>漢{sizes.kanji}pt　仮{sizes.kana}pt　英{sizes.alpha}pt</span>
          {lineCount > 0 && <span style={{ fontSize: 11, color: "#a08060", fontFamily: "sans-serif", background: "#e8e4f4", padding: "2px 10px", borderRadius: 20 }}>{lineCount}行</span>}
        </div>
      )}

      {/* テキスト（クリップ枠 + 実テキスト） */}
      {clipStyle && <div style={clipStyle} />}
      <div style={offsetStyle} ref={textContainerRef}>
        {/* 手動調整時の青いガイド＋ドラッグハンドル */}
        {showOffsetGuide && (
          <div style={{
            position: "absolute", inset: 0, zIndex: 10,
            background: "rgba(100, 160, 255, 0.12)",
            border: "2px solid rgba(60, 120, 255, 0.5)",
            borderRadius: 4,
            pointerEvents: "none",
          }}>
            <div style={{ position: "absolute", top: 2, left: 4, fontSize: 9, color: "rgba(40,80,200,0.8)", fontFamily: "sans-serif", userSelect: "none" }}>テキストエリア</div>
          </div>
        )}
        {/* 4隅ドラッグハンドル */}
        {showOffsetGuide && onDragOffset && (() => {
          const corners = [
            { id: "tl", cursor: "nwse-resize", style: { top: -8, left: -8 },
              sides: { top: 1, left: 1, bottom: 0, right: 0 }, dirY: 1, dirX: 1 },
            { id: "tr", cursor: "nesw-resize", style: { top: -8, right: -8 },
              sides: { top: 1, right: 1, bottom: 0, left: 0 }, dirY: 1, dirX: -1 },
            { id: "bl", cursor: "nesw-resize", style: { bottom: -8, left: -8 },
              sides: { bottom: 1, left: 1, top: 0, right: 0 }, dirY: -1, dirX: 1 },
            { id: "br", cursor: "nwse-resize", style: { bottom: -8, right: -8 },
              sides: { bottom: 1, right: 1, top: 0, left: 0 }, dirY: -1, dirX: -1 },
          ];
          return corners.map(({ id, cursor, style, sides, dirY, dirX }) => (
            <div key={id}
              style={{
                position: "absolute", zIndex: 20, width: 20, height: 20,
                background: "rgba(40,100,255,0.85)", borderRadius: 4,
                border: "2px solid #fff", cursor, boxShadow: "0 1px 4px rgba(0,0,0,0.3)",
                ...style,
              }}
              onMouseDown={(e) => {
                e.preventDefault();
                const startX = e.clientX, startY = e.clientY;
                const startOffset = { ...textOffset };
                const onMove = (ev) => {
                  const dx = (ev.clientX - startX) * dirX;
                  const dy = (ev.clientY - startY) * dirY;
                  onDragOffset(sides, dx, dy, startOffset);
                };
                const onUp = () => {
                  window.removeEventListener("mousemove", onMove);
                  window.removeEventListener("mouseup", onUp);
                };
                window.addEventListener("mousemove", onMove);
                window.addEventListener("mouseup", onUp);
              }}
              onTouchStart={(e) => {
                const t0 = e.touches[0];
                const startX = t0.clientX, startY = t0.clientY;
                const startOffset = { ...textOffset };
                const onMove = (ev) => {
                  const t = ev.touches[0];
                  const dx = (t.clientX - startX) * dirX;
                  const dy = (t.clientY - startY) * dirY;
                  onDragOffset(sides, dx, dy, startOffset);
                };
                const onUp = () => {
                  window.removeEventListener("touchmove", onMove);
                  window.removeEventListener("touchend", onUp);
                };
                window.addEventListener("touchmove", onMove, { passive: true });
                window.addEventListener("touchend", onUp);
              }}
            />
          ));
        })()}
        {lines ? (
          <div style={{ display: "flex", flexDirection: vertical ? "row-reverse" : "column", gap: vertical ? 16 : 8, justifyContent: vertical ? "flex-start" : (bgImage && vAlign === "center" ? "space-evenly" : "stretch"), height: (bgImage && vAlign === "center") ? "100%" : "auto" }}>
            {lines.map((line, i) => (
              <div key={i} ref={el => lineRefs.current[i] = el}
                style={{ display: "flex", alignItems: "center", gap: 10, padding: vertical ? "0 4px" : "0", borderBottom: !vertical && !bgImage && i < lines.length - 1 ? "1px dashed rgba(212,196,160,0.5)" : "none", width: "100%", flex: bgImage && vAlign === "center" ? 1 : "none", justifyContent: "flex-start" }}>
                {!bgImage && <span data-linenum="1" style={{ fontSize: 11, color: "#b0956a", fontFamily: "sans-serif", minWidth: 18, textAlign: "right", userSelect: "none", flexShrink: 0 }}>{i + 1}</span>}
                <span data-textspan="1" style={{
                  fontFamily: currentFont.family,
                  color: "#1a0e05",
                  lineHeight: lineHeight ?? 1.8,
                  display: "block",
                  flex: 1,
                  minWidth: 0,
                  overflow: "visible",
                  ...(justify && !vertical && i < lines.length - 1 ? {
                    textAlign: "justify",
                    textJustify: "inter-ideograph",
                    textAlignLast: "justify",
                    whiteSpace: "normal",
                    wordBreak: "break-all",
                    letterSpacing: "0em",
                  } : {
                    whiteSpace: "nowrap",
                    letterSpacing: "0.05em",
                  }),
                  ...textBoxStyle
                }}>{renderText(line)}</span>
              </div>
            ))}
          </div>
        ) : (
          <div style={{ padding: bgImage ? 0 : "8px 0", display: "flex", justifyContent: vertical ? "flex-end" : "flex-start", height: bgImage ? "100%" : "auto" }}>
            <span style={{ fontFamily: currentFont.family, color: "#1a0e05", lineHeight: lineHeight ?? 1.8, letterSpacing: vertical ? "0.1em" : "0.05em", ...textBoxStyle }}>{renderText(text)}</span>
          </div>
        )}
      </div>

      {/* フッター（PDF背景なしのとき） */}
      {!bgImage && (
        <>
          <div style={{ position: "relative", zIndex: 1, marginTop: 28, padding: "16px 20px", background: "#f0e8d4", borderLeft: "4px solid #8b7355", borderRadius: "0 6px 6px 0" }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#6b4c2a", fontFamily: "sans-serif", letterSpacing: "0.15em", marginBottom: 8 }}>【ポイント】</div>
            {["全角文字・数字を丁寧に、一定の大きさで書くこと", "句読点（、。）の位置に注意すること", "行頭・行末をそろえ、均等なバランスで書くこと"].map((p, i) => (
              <div key={i} style={{ fontSize: 12, color: "#4a3020", fontFamily: "sans-serif", lineHeight: 1.8 }}>・{p}</div>
            ))}
          </div>
          <div style={{ position: "relative", zIndex: 1, marginTop: 20, textAlign: "right", fontSize: 11, color: "#b0956a", fontFamily: "sans-serif", letterSpacing: "0.1em" }}>習字教室　課題プリント</div>
        </>
      )}
    </>
  );
}

function ShujiMihon() {
  const [sizes, setSizes] = useState({ kanji: 28, kana: 28, alpha: 28 });
  const [sizeTarget, setSizeTarget] = useState("all");
  const [text, setText] = useState(DEFAULT_TEXT);
  const [lineCount, setLineCount] = useState(0);

    setJustify(true);

${isVertical ? "縦書き用紙として、縦の列（欄）" : "横書き用紙として、横の行（罫線）"}を分析してください。

以下をJSON形式のみで返してください（説明不要）：
{
  "lines": テキストを書く行/列の数（0〜8の整数）,
  "marginTop": 用紙上端からテキストエリア開始までの割合（0.0〜0.5）,

    const setter = isVertical ? setBgV : setBgH;

      if (!window.pdfjsLib) {
        // pdf.js本体を先にロード
        await new Promise((res, rej) => {
          const s = document.createElement("script");
          s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
          s.onload = res; s.onerror = rej;
          document.head.appendChild(s);
        });

        await new Promise((res, rej) => {
          const s = document.createElement("script");
          s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
          s.onload = res; s.onerror = rej;

      }
      const arrayBuffer = await file.arrayBuffer();

      const page = await pdf.getPage(1);

      const canvas = document.createElement("canvas");
      canvas.width = viewport.width;
      canvas.height = viewport.height;

      const dataUrl = canvas.toDataURL("image/jpeg", 0.85);

  const applySnapshot = (s) => { setText(s.text); setSizes(s.sizes); setSelectedFont(s.selectedFont); setVertical(s.vertical); };
  const canUndo = historyIdx.current > 0;

  const handleSave = async () => {

  const autoSplitLines = (newText, currentLineCount) => {
    if (!newText || newText.length === 0) return;
    const len = newText.length;

    const targetLines = currentLineCount > 0 ? currentLineCount : Math.min(8, Math.max(2, Math.ceil(len / 12)));
    if (currentLineCount === 0) setLineCount(targetLines);

    // フォント読み込み後に幅ベース分割を実行
    const run = async () => {
      const font = FONTS.find(f => f.key === selectedFont) || FONTS[0];
      try { await document.fonts.load(`${sizes.kanji}px ${font.family}`); } catch(e) {}

      // paper幅からコンテナ幅を推定
      const paperEl = mainPaperRef.current;
      let containerW = 500; // デフォルト
      if (paperEl) {
        const paperW = paperEl.offsetWidth || 728;
        const pad = bgImage ? 72 : 96; // padding分
        const off = textOffset ? (textOffset.left || 40) + (textOffset.right || 40) : 80;
        containerW = Math.max(200, paperW - pad - off);
      }

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      ctx.font = `${sizes.kanji}px ${font.family}, serif`;

      // 幅ベースで行を分割（行数上限あり）
      const splits = [];
      let lineStart = 0;
      let lineW = 0;
      for (let i = 0; i < len; i++) {
        const charW = ctx.measureText(newText[i]).width;
        if (lineW + charW > containerW && i > lineStart && splits.length < targetLines - 1) {
          splits.push(i);
          lineStart = i;
          lineW = charW;
        } else {
          lineW += charW;
        }
      }

      if (splits.length > 0) {
        setLineSplits(splits);
        if (currentLineCount === 0) setLineCount(splits.length + 1);
      } else {
        // フォールバック：均等分割
        const perLine = Math.ceil(len / targetLines);
        const eqSplits = [];
        for (let i = 1; i < targetLines; i++) {
          eqSplits.push(Math.min(i * perLine, len - 1));
        }
        setLineSplits(eqSplits);
      }
    };

    run();
  };
  const cancelEdit = () => { setEditing(false); setOcrImage(null); setOcrError(""); };
  const currentFont = FONTS.find((f) => f.key === selectedFont) ?? FONTS[0];
  const changeFont = (key) => { pushHistory(snapshot()); setSelectedFont(key); };
  const changeVertical = (v) => { pushHistory(snapshot()); setVertical(v); };

  // テキスト位置をドラッグで調整（4隅: sides={top,bottom,left,right}各0or1）
  const handleDragOffset = (sides, dx, dy, startOffset) => {
    setTextOffset(prev => {
      const base = startOffset ?? prev;
      return {
        top:    sides.top    ? Math.max(0, Math.min(200, base.top    + Math.round(dy))) : prev.top,
        bottom: sides.bottom ? Math.max(0, Math.min(200, base.bottom + Math.round(dy))) : prev.bottom,

        right:  sides.right  ? Math.max(0, Math.min(200, base.right  + Math.round(dx))) : prev.right,

  // 背景画像に罫線を描画して合成する
  const drawRuledLines = async (baseDataUrl, lineCount, isVertical, offset) => {
    if (!baseDataUrl || lineCount < 2) return baseDataUrl;
    return new Promise((resolve) => {
      const img = new window.Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0);

        // オフセットをpx→画像座標に変換（用紙表示幅 vs 画像幅の比率）
        const displayW = isVertical ? 515 : 728;
        const displayH = isVertical ? 728 : 515;
        const scaleX = img.width / displayW;
        const scaleY = img.height / displayH;

        const top    = (offset?.top    ?? 40) * scaleY;
        const bottom = (offset?.bottom ?? 40) * scaleY;
        const left   = (offset?.left   ?? 40) * scaleX;
        const right  = (offset?.right  ?? 40) * scaleX;

        const areaW = img.width  - left - right;
        const areaH = img.height - top  - bottom;

        ctx.strokeStyle = "rgba(180, 140, 80, 0.6)";
        ctx.lineWidth = Math.max(1, img.width / 400);
        ctx.setLineDash([8 * scaleX, 4 * scaleX]);

        if (!isVertical) {
          // 横書き：横の罫線を行数+1本描画（上下境界含む）
          for (let i = 0; i <= lineCount; i++) {
            const y = top + (areaH / lineCount) * i;
            ctx.beginPath();
            ctx.moveTo(left, y);
            ctx.lineTo(img.width - right, y);
            ctx.stroke();
          }
        } else {
          // 縦書き：縦の罫線を列数+1本描画（左右境界含む）
          for (let i = 0; i <= lineCount; i++) {
            const x = left + (areaW / lineCount) * i;
            ctx.beginPath();
            ctx.moveTo(x, top);
            ctx.lineTo(x, img.height - bottom);
            ctx.stroke();
          }
        }

        resolve(canvas.toDataURL("image/jpeg", 0.90));
      };
      img.src = baseDataUrl;
    });
  };

  // 行数変更 → 均等分割でsplitsを初期化
  const changeLineCount = (n) => {

    if (n > 0) {

      const min = idx === 0 ? 1 : prev[idx - 1] + 1;
      const max = idx === prev.length - 1 ? text.length - 1 : prev[idx + 1] - 1;
      next[idx] = Math.min(max, Math.max(min, prev[idx] + dir));

        else setDocError("テキストを抽出できませんでした");

                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: "#2c1a0e", fontFamily: "sans-serif", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{save.name}</div>
                    <div style={{ fontSize: 10, color: "#a08060", fontFamily: "sans-serif", marginTop: 2 }}>{(FONTS.find(f=>f.key===save.selectedFont)?.label ?? save.selectedFont)}　{save.vertical ? "縦書き" : "横書き"}　漢{save.sizes.kanji}pt 仮{save.sizes.kana}pt 英{save.sizes.alpha}pt</div>
                    <div style={{ fontSize: 10, color: "#b8a080", fontFamily: "sans-serif", marginTop: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{save.text.slice(0, 30)}{save.text.length > 30 ? "…" : ""}</div>
                  </div>
                  <button onClick={() => handleLoad(save)} style={{ background: "#4a7c59", color: "#fff", border: "none", borderRadius: 7, padding: "6px 14px", fontSize: 12, fontFamily: "sans-serif", cursor: "pointer" }}>読込</button>
                  <button onClick={() => handleDelete(save.key)} style={{ background: "#c0392b", color: "#fff", border: "none", borderRadius: 7, padding: "6px 10px", fontSize: 12, fontFamily: "sans-serif", cursor: "pointer" }}>✕</button>
                </div>
              ))}
            </div>
            <button onClick={() => setSavingOpen(false)} style={{ marginTop: 18, background: "#e8e0d0", color: "#6b4c2a", border: "none", borderRadius: 8, padding: "10px 0", fontSize: 13, fontFamily: "sans-serif", cursor: "pointer" }}>閉じる</button>
          </div>
        </div>
      )}

      {/* テキスト編集モーダル */}
      {editing && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", zIndex: 100, display: "flex", alignItems: isMobile ? "flex-end" : "center", justifyContent: "center", padding: isMobile ? 0 : 24 }}>
          <div style={{ background: "#fffef9", borderRadius: isMobile ? "16px 16px 0 0" : 12, padding: isMobile ? "20px 16px" : 28, width: "100%", maxWidth: isMobile ? "100%" : 620, boxShadow: "0 8px 40px rgba(0,0,0,0.2)", border: "1px solid #d4c4a0", maxHeight: isMobile ? "90vh" : "none", overflowY: isMobile ? "auto" : "visible" }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: "#2c1a0e", fontFamily: "sans-serif", marginBottom: 14 }}>課題テキストを編集</div>
            <div style={{ background: "#f5f0e8", border: "1px dashed #c8b48a", borderRadius: 10, padding: "14px 16px", marginBottom: 14 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#6b4c2a", fontFamily: "sans-serif", marginBottom: 10 }}>📷 画像からテキストを読み込む</div>
              <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
                <label style={{ background: "#fff", border: "1px solid #c8b48a", borderRadius: 8, padding: "7px 16px", fontSize: 12, fontFamily: "sans-serif", color: "#6b4c2a", cursor: "pointer" }}>
                  🖼️ 画像を選択
                  <input ref={imageInputRef} type="file" accept="image/*" onChange={handleImageUpload} style={{ display: "none" }} />
                </label>
                {ocrImage && (
                  <>
                    <img src={ocrImage} alt="選択画像" style={{ height: 48, borderRadius: 6, border: "1px solid #d4c4a0", objectFit: "cover" }} />
                    <button onClick={handleOcr} disabled={ocrLoading} style={{ background: ocrLoading ? "#aaa" : "#4a6b8a", color: "#fff", border: "none", borderRadius: 8, padding: "7px 18px", fontSize: 12, fontFamily: "sans-serif", cursor: ocrLoading ? "not-allowed" : "pointer", fontWeight: 700 }}>
                      {ocrLoading ? "⏳ 読み取り中…" : "✨ テキストを読み取る"}
                    </button>
                    <button onClick={() => { setOcrImage(null); if (imageInputRef.current) imageInputRef.current.value = ""; }} style={{ background: "#e8e0d0", color: "#6b4c2a", border: "none", borderRadius: 8, padding: "7px 12px", fontSize: 12, fontFamily: "sans-serif", cursor: "pointer" }}>✕</button>
                  </>
                )}
              </div>
              {ocrError && <div style={{ color: "#c0392b", fontSize: 11, fontFamily: "sans-serif", marginTop: 8 }}>{ocrError}</div>}
              {!ocrImage && <div style={{ color: "#b0956a", fontSize: 11, fontFamily: "sans-serif", marginTop: 6 }}>写真・スキャン・スクリーンショットなどから自動読み取りします</div>}
            </div>

            {/* Word / Excel 読み込み */}
            <div style={{ background: "#eef2f8", border: "1px dashed #a0b4cc", borderRadius: 10, padding: "14px 16px", marginBottom: 14 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#2c4a6b", fontFamily: "sans-serif", marginBottom: 10 }}>📄 Word・Excel からテキストを読み込む</div>
              <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
                <label style={{ background: "#fff", border: "1px solid #a0b4cc", borderRadius: 8, padding: "7px 16px", fontSize: 12, fontFamily: "sans-serif", color: "#2c4a6b", cursor: "pointer", whiteSpace: "nowrap" }}>
                  📁 ファイルを選択
                  <input ref={docInputRef} type="file" accept=".docx,.xlsx,.xls,.csv" onChange={handleDocUpload} style={{ display: "none" }} />
                </label>
                {docLoading && <span style={{ fontSize: 12, color: "#4a6b8a", fontFamily: "sans-serif" }}>⏳ 読み込み中…</span>}
              </div>
              {docError && <div style={{ color: "#c0392b", fontSize: 11, fontFamily: "sans-serif", marginTop: 8 }}>{docError}</div>}
              <div style={{ color: "#6a8aaa", fontSize: 11, fontFamily: "sans-serif", marginTop: 6 }}>対応形式：.docx（Word）・.xlsx / .xls（Excel）・.csv</div>
            </div>
            <textarea value={draft} onChange={(e) => setDraft(e.target.value)} autoFocus
              style={{ width: "100%", minHeight: 160, fontSize: 15, fontFamily: currentFont.family, lineHeight: 1.8, color: "#1a0e05", background: "#faf7f0", border: "1px solid #c8b88a", borderRadius: 8, padding: "12px 14px", resize: "vertical", outline: "none", boxSizing: "border-box" }} />
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 16 }}>
              <button onClick={cancelEdit} style={{ background: "#e8e0d0", color: "#6b4c2a", border: "none", borderRadius: 8, padding: "9px 20px", fontSize: 13, fontFamily: "sans-serif", cursor: "pointer" }}>キャンセル</button>
              <button onClick={applyEdit} style={{ background: "#4a7c59", color: "#fff", border: "none", borderRadius: 8, padding: "9px 24px", fontSize: 13, fontFamily: "sans-serif", cursor: "pointer", fontWeight: 700 }}>適用する</button>
            </div>
          </div>
        </div>
      )}

      {previewing && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 9999, display: "flex", flexDirection: "column", alignItems: "center", overflowY: "auto", padding: "24px 16px" }}>
          <div style={{ width: "100%", maxWidth: 900, display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16, flexWrap: "wrap", gap: 10, flexShrink: 0 }}>
            <div style={{ color: "#fff", fontFamily: "sans-serif", fontSize: 15, fontWeight: 700 }}>
              🖨️ 印刷プレビュー
              <span style={{ fontSize: 11, fontWeight: 400, opacity: 0.7, marginLeft: 12 }}>
                {bgImage ? (vertical ? "B5 縦" : "B5 横") : "A4"} ／ アプリと同一表示
              </span>
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={handlePrint}
                style={{ background: "#2c5f8a", color: "#fff", border: "none", borderRadius: 8, padding: "10px 22px", fontSize: 14, fontFamily: "sans-serif", cursor: "pointer", fontWeight: 700 }}>
                🖨️ 印刷する
              </button>
              <button onClick={() => setPreviewing(false)}
                style={{ background: "#555", color: "#fff", border: "none", borderRadius: 8, padding: "10px 18px", fontSize: 14, fontFamily: "sans-serif", cursor: "pointer" }}>
                ✕ 閉じる
              </button>
            </div>
          </div>
          <div ref={printRef} style={{ width: "100%", maxWidth: bgImage ? (vertical ? 515 : 728) : 900, background: "#fffef9", border: "1px solid #d4c4a0", borderRadius: 4, boxShadow: "0 4px 24px rgba(0,0,0,0.3)", padding: bgImage ? "36px 36px" : "40px 48px", position: "relative", overflow: "hidden", aspectRatio: bgImage ? (vertical ? "182 / 257" : "257 / 182") : "auto", flexShrink: 0 }}>
            <KadaiContent text={text} sizes={sizes} currentFont={currentFont} vertical={vertical} renderText={renderText} lineCount={lineCount} lineSplits={lineSplits} bgImage={bgImage} textOffset={textOffset} lineHeight={lineHeight} justify={justify} autoFontSize={autoFontSize} onAutoFontSize={handleAutoFontSize} showOffsetGuide={offsetOpen} onDragOffset={handleDragOffset} vAlign={vAlign} />
          </div>
          <div style={{ marginTop: 12, color: "rgba(255,255,255,0.5)", fontFamily: "sans-serif", fontSize: 11, flexShrink: 0 }}>
            「印刷する」を押すとブラウザの印刷ダイアログが開きます
          </div>
        </div>
      )}

      {/* 用紙 */}
      <div id="shuji-main-paper" ref={mainPaperRef} data-paper="1" style={{ width: bgImage ? (vertical ? 515 : 728) : 900, maxWidth: "100%", background: "#fffef9", border: "1px solid #d4c4a0", borderRadius: isMobile ? 8 : 4, boxShadow: "0 4px 24px rgba(0,0,0,0.10)", padding: isMobile ? (bgImage ? "20px 20px" : "20px 16px") : (bgImage ? "36px 36px" : "40px 48px"), position: "relative", overflow: "hidden", aspectRatio: bgImage ? (vertical ? "182 / 257" : "257 / 182") : "auto", transition: "width 0.3s ease, padding 0.3s ease" }}>
        <KadaiContent text={text} sizes={sizes} currentFont={currentFont} vertical={vertical} renderText={renderText} lineCount={lineCount} lineSplits={lineSplits} bgImage={bgImage} textOffset={textOffset} lineHeight={lineHeight} justify={justify} autoFontSize={autoFontSize} onAutoFontSize={handleAutoFontSize} showOffsetGuide={offsetOpen} onDragOffset={handleDragOffset} vAlign={vAlign} />
      </div>
      {/* 行区切り調整UI */}
      {lineCount > 0 && lineSplits.length > 0 && (() => {
        const lines = buildLines(text, lineSplits);
        return (
          <div style={{ width: "100%", maxWidth: bgImage ? (vertical ? 515 : 728) : 900, marginTop: 12, background: "#fff", border: "1px solid #d4c4a0", borderRadius: 10, padding: "14px 20px", boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#6b4c2a", fontFamily: "sans-serif", letterSpacing: "0.1em", marginBottom: 12 }}>
              ✂️ 行の区切り位置を調整
              <span style={{ fontSize: 10, fontWeight: 400, color: "#a08060", marginLeft: 10 }}>← → で1文字ずつ移動</span>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {lineSplits.map((splitPos, idx) => {
                const prevPos = idx === 0 ? 0 : lineSplits[idx - 1];
                const lineText = text.slice(prevPos, splitPos);
                const nextText = text.slice(splitPos, idx === lineSplits.length - 1 ? text.length : lineSplits[idx + 1]);
                const previewEnd = lineText.slice(-4);
                const previewStart = nextText.slice(0, 4);
                return (
                  <div key={idx} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 10px", background: "#faf6ee", borderRadius: 8, border: "1px solid #e8dfc8" }}>
                    <span style={{ fontSize: 11, color: "#a08060", fontFamily: "sans-serif", minWidth: 40 }}>{idx + 1}→{idx + 2}行</span>
                    <button onClick={() => moveSplit(idx, -1)} style={{ ...btnStyle("#6b4c2a"), width: 30, height: 30, fontSize: 16, borderRadius: 6, flexShrink: 0 }}>←</button>
                    <div style={{ flex: 1, textAlign: "center", fontFamily: currentFont.family, fontSize: 14, color: "#2c1a0e", overflow: "hidden", whiteSpace: "nowrap" }}>
                      <span style={{ color: "#6b4c2a" }}>…{previewEnd}</span>
                      <span style={{ display: "inline-block", width: 2, height: 16, background: "#c0392b", verticalAlign: "middle", margin: "0 4px", borderRadius: 1 }} />
                      <span style={{ color: "#2c5f8a" }}>{previewStart}…</span>
                    </div>
                    <button onClick={() => moveSplit(idx, +1)} style={{ ...btnStyle("#6b4c2a"), width: 30, height: 30, fontSize: 16, borderRadius: 6, flexShrink: 0 }}>→</button>
                    <span style={{ fontSize: 10, color: "#b0956a", fontFamily: "sans-serif", minWidth: 48, textAlign: "right" }}>{splitPos}/{text.length}字</span>
                  </div>
                );
              })}
            </div>
            <button onClick={() => changeLineCount(lineCount)} style={{ marginTop: 10, fontSize: 11, fontFamily: "sans-serif", color: "#8b7355", background: "#f0e8d4", border: "1px solid #c8b48a", borderRadius: 6, padding: "4px 14px", cursor: "pointer" }}>
              均等分割に戻す
            </button>
          </div>
        );
      })()}

      <div style={{ marginTop: 16, fontSize: 11, color: "#a08060", fontFamily: "sans-serif" }}>文字種タブを選んで ＋ / － で0.1pt単位調整できます</div>
    </div>
  );
}

const controlBox = { display: "flex", alignItems: "center", gap: 8, background: "#fff", border: "1px solid #d4c4a0", borderRadius: 12, padding: "8px 14px", boxShadow: "0 2px 8px rgba(0,0,0,0.06)" };
const labelStyle = { fontSize: 11, color: "#8b7355", fontFamily: "sans-serif", letterSpacing: "0.1em", marginRight: 4, whiteSpace: "nowrap" };
const mobileLabel = { fontSize: 11, color: "#8b7355", fontFamily: "sans-serif", marginBottom: 4, fontWeight: 700, letterSpacing: "0.1em" };
function mobileToggleBtn(active, activeColor = "#6b4c2a") {
  return {
    background: active ? activeColor : "#f0e8d4",
    color: active ? "#fff" : "#6b4c2a",
    border: "1px solid", borderColor: active ? activeColor : "#c8b48a",
    borderRadius: 8, padding: "8px 12px", cursor: "pointer",
    fontSize: 13, fontFamily: "sans-serif", letterSpacing: "0.05em",
    minHeight: 44, display: "inline-flex", alignItems: "center", justifyContent: "center",
  };
}
function actionBtn(bg) { return { background: bg, color: "#fff", border: "none", borderRadius: 10, padding: "10px 18px", fontSize: 13, fontFamily: "sans-serif", letterSpacing: "0.1em", cursor: "pointer", boxShadow: "0 2px 8px rgba(0,0,0,0.10)", whiteSpace: "nowrap" }; }
function toggleBtn(active, activeColor = "#6b4c2a") { return { background: active ? activeColor : "#f0e8d4", color: active ? "#fff" : "#6b4c2a", border: "1px solid", borderColor: active ? activeColor : "#c8b48a", borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 14, transition: "all 0.15s", display: "flex", flexDirection: "column", alignItems: "center", lineHeight: 1.3, minWidth: 48 }; }
function btnStyle(bg) { return { background: bg, color: "#fff", border: "none", borderRadius: 8, width: 36, height: 36, fontSize: 20, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "sans-serif" }; }

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<ShujiMihon/>);
</script>
</body>
</html>
