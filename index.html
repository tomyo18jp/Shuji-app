<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:#1a0e08;overscroll-behavior:none;}
input[type=range]{-webkit-appearance:none;height:24px;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#c8a878;cursor:pointer;}
input[type=range]::-webkit-slider-runnable-track{height:3px;border-radius:2px;background:#4a3020;}
button{-webkit-touch-callout:none;user-select:none;}
textarea{font-size:16px;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#1a0e08;}
::-webkit-scrollbar-thumb{background:#4a3020;border-radius:2px;}
</style>

<body>
<div id="root" style="height:100%;"></div>
<script>
if(window.pdfjsLib){pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';}
(function(){
  var _w=console.warn.bind(console);
  console.warn=function(){var m=arguments[0]&&String(arguments[0]);if(m&&(m.includes('Babel')||m.includes('fake worker')||m.includes('Setting up')))return;_w.apply(console,arguments);};
})();
var _storage={
  set:function(k,v){return new Promise(function(res,rej){try{localStorage.setItem(k,typeof v==='string'?v:JSON.stringify(v));res({key:k,value:v})}catch(e){rej(e)}});},
  get:function(k){return new Promise(function(res){var v=localStorage.getItem(k);res(v!==null?{key:k,value:v}:null)});},
  delete:function(k){return new Promise(function(res){localStorage.removeItem(k);res({key:k,deleted:true})});},
  list:function(p){return new Promise(function(res){var keys=Object.keys(localStorage).filter(function(k){return !p||k.startsWith(p)});res({keys:keys})});}
};
var {useState,useRef,useEffect}=React;
window.loadPdfLibs=function(){
  function ls(src){return new Promise(function(res,rej){
    if(document.querySelector('[data-lib="'+src+'"]')){res();return;}
    var s=document.createElement("script");
    s.setAttribute("data-lib",src);s.src=src;s.onload=res;s.onerror=rej;
    document.head.appendChild(s);
  });}
  return ls("https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js")
    .then(function(){return ls("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js");});
};
</script>
<script type="text/babel" src="shuji_app.js"></script>
